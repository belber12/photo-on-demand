[build]
  command = "npm run build"
  publish = "dist"

# Netlify Image CDN — разрешаем трансформацию изображений с Supabase
[images]
  remote_images = ["https://nctkkhnqtfambhamfvmi\\.supabase\\.co/.*"]

# Заголовки безопасности для всего сайта
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Кеш для хешированных ассетов (JS/CSS с content hash — 1 год)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Кеш для изображений и шрифтов
[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Дополнительные заголовки для /admin
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-store, no-cache"

[[redirects]]
  from = "/yandex_c56b6a7384e7f6bf.html"
  to = "/yandex_c56b6a7384e7f6bf.html"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
